name: Lint

# Runs luacheck against the addon on every push/PR. We can't always run the
# linter locally, so CI is the source of truth that .luacheckrc stays in sync
# with the code (see .luacheckrc). Lua 5.1 matches WoW's Lua flavor.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  luacheck:
    name: luacheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Lua 5.1
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck .
